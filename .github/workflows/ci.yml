name: MLOps Antifraud CI Pipeline

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  continuous-integration:
    runs-on: ubuntu-latest

    steps:
    - name: Checkout Repository
      uses: actions/checkout@v4

    - name: Set up Python 3.9
      uses: actions/setup-python@v5
      with:
        python-version: "3.9"

    - name: Install Software Quality Dependencies
      run: |
        python -m pip install --upgrade pip
        pip install numpy==1.23.5 pandas==1.5.3 scikit-learn==1.2.2 pytest==7.2.2 matplotlib==3.7.1 seaborn==0.12.2

    - name: Execute Antifraud Pipeline
      run: |
        python pipeline.py

    - name: Archive Production Model Artifacts
      uses: actions/upload-artifact@v4
      with:
        name: business-kpi-plots
        path: matriz_confusao.png

    - name: Run Pytest Suite (Sanity QA Check)
      run: |
        pytest test_pipeline.py -v
